#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "time-teller"
version = "0.1.0"
authors = ["ram-pi"]
description = "Chess-clock analog clock showing 9 world timezones"

[[trigger.http]]
route = "/..."
component = "time-teller"

[component.time-teller]
source = "target/wasm32-wasip2/release/time_teller_composed.wasm"
allowed_outbound_hosts = []
key_value_stores = ["default"]

[component.time-teller.build]
command = "cargo component build --target wasm32-wasip2 --release && cp ../components/time-zone-clock/target/wasm32-wasip2/release/time_zone_clock.wasm /tmp/time-zone-clock.wasm && wasm-tools compose target/wasm32-wasip2/release/time_teller.wasm --definitions /tmp/time-zone-clock.wasm -o target/wasm32-wasip2/release/time_teller_composed.wasm"
watch = ["src/**/*.rs", "Cargo.toml"]
