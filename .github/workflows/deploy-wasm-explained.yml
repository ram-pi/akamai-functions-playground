name: Deploy wasm-explained to Akamai Functions

on:
  push:
    branches:
      - main
    paths:
      - "wasm-explained-static-content/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Static App
    steps:
      - uses: actions/checkout@v4

      - name: Install Spin
        uses: fermyon/actions/spin/setup@v1

      - name: Install the aka Plugin for Spin
        run: spin plugins update && spin plugins install aka --yes

      - name: Login to Akamai Functions
        run: spin aka login --token ${{ secrets.AKAMAI_FUNCTIONS_TOKEN }}

      - name: Check if App exists
        id: check
        run: |
          if spin aka apps list --account-id ${{ secrets.AKAMAI_FUNCTIONS_ACCOUNT_ID }} | grep -xF "wasm-explained-static-content" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "App wasm-explained-static-content found."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "App wasm-explained-static-content not found."
          fi
        working-directory: wasm-explained-static-content

      - name: Link to existing App
        if: steps.check.outputs.exists == 'true'
        run: spin aka app link --app-name wasm-explained-static-content --account-id ${{ secrets.AKAMAI_FUNCTIONS_ACCOUNT_ID }}
        working-directory: wasm-explained-static-content

      - name: Deploy (new)
        if: steps.check.outputs.exists == 'false'
        run: spin aka deploy --account-id ${{ secrets.AKAMAI_FUNCTIONS_ACCOUNT_ID }} --create-name wasm-explained-static-content --no-confirm --skip-readiness-check
        working-directory: wasm-explained-static-content

      - name: Redeploy (existing)
        if: steps.check.outputs.exists == 'true'
        run: spin aka deploy --account-id ${{ secrets.AKAMAI_FUNCTIONS_ACCOUNT_ID }} --no-confirm --skip-readiness-check
        working-directory: wasm-explained-static-content

      - name: Get app URL
        id: app-status
        continue-on-error: true
        run: |
          for i in 1 2 3 4 5; do
            URL=$(spin aka app status --app-name wasm-explained-static-content 2>/dev/null | grep -oP 'https://\S+\.fwf\.app' || true)
            if [ -n "$URL" ]; then
              echo "url=$URL" >> $GITHUB_OUTPUT
              echo "Captured URL: $URL"
              exit 0
            fi
            echo "Attempt $i: URL not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Could not capture URL after 5 attempts, continuing without it."

      - name: Persist deployed URL
        run: |
          URL="${{ steps.app-status.outputs.url }}"
          if [ -z "$URL" ]; then echo "No URL captured, skipping."; exit 0; fi
          printf '{"schemaVersion":1,"label":"Wasm Explained","message":"live","color":"brightgreen","isError":false}\n' \
            > .github/wasm-explained-url.json
          sed -i "/wasm-explained-url\.json/ s|(https://[a-z0-9-]*\.fwf\.app)|($URL)|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/wasm-explained-url.json README.md
          git diff --staged --quiet || git commit -m "chore: update wasm-explained app URL [skip ci]"
          git push
