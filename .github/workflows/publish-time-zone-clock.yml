name: Publish time-zone-clock wasm to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "components/time-zone-clock/**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: components/time-zone-clock

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Install wasm-tools
        run: cargo install wasm-tools --locked

      - name: Build
        run: |
          cd components/time-zone-clock
          cargo component build --target wasm32-wasip2 --release

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push wasm as OCI artifact (latest)
        run: |
          oras push \
            ghcr.io/ram-pi/time-zone-clock:latest \
            ./components/time-zone-clock/target/wasm32-wasip2/release/time_zone_clock.wasm:application/vnd.wasm.content.layer.v1+wasm

      - name: Push wasm as OCI artifact (semver tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          oras push \
            ghcr.io/ram-pi/time-zone-clock:${{ github.ref_name }} \
            ./components/time-zone-clock/target/wasm32-wasip2/release/time_zone_clock.wasm:application/vnd.wasm.content.layer.v1+wasm
