name: Publish time-teller wasm to GHCR

on:
  push:
    branches:
      - main
    paths:
      - "time-teller/**"
      - "components/time-zone-clock/**"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: time-teller

      - name: Build
        run: |
          cd time-teller
          cargo build --target wasm32-wasip1 --release

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push wasm as OCI artifact (latest)
        run: |
          oras push \
            ghcr.io/ram-pi/time-teller:latest \
            ./time-teller/target/wasm32-wasip1/release/time_teller.wasm:application/vnd.wasm.content.layer.v1+wasm

      - name: Push wasm as OCI artifact (semver tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          oras push \
            ghcr.io/ram-pi/time-teller:${{ github.ref_name }} \
            ./time-teller/target/wasm32-wasip1/release/time_teller.wasm:application/vnd.wasm.content.layer.v1+wasm
